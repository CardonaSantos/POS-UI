<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var appearance = localStorage.getItem("app-appearance");

          if (appearance === "dark") {
            document.documentElement.classList.add("dark");
            document.documentElement.dataset.appAppearance = "dark";
          } else {
            document.documentElement.classList.remove("dark");
            document.documentElement.dataset.appAppearance = "light";
          }
        } catch (error) {}
      })();
    </script>

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logoNvPNG.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS-CRM</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
